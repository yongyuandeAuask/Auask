name: Build ARM64 Tracker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4
      
    - name: 2. 配置 Android NDK 环境
      run: |
        echo "当前 NDK 路径: $ANDROID_NDK_HOME"
        # 确认 NDK 中的 ARM64 编译器存在
        ls $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ | grep aarch64
        
    - name: 3. 编译 ARM64 可执行文件
      run: |
        # 定义 NDK 中的 clang++ 编译器路径 (API 28 兼容绝大多数安卓手机)
        CLANG=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang++
        
        echo "当前目录文件:"
        ls -lh
        
        # 开始编译！
        # -std=c++17: 使用 C++17 标准
        # -O2: 开启代码优化
        # -static-libstdc++: 【核心】静态链接 C++ 库，防止手机上运行报 "library not found"
        # -L. -lparadise_api: 链接当前目录下的 libparadise_api.a
        $CLANG main.cpp -std=c++17 -O2 -static-libstdc++ -L. -lparadise_api -llog -o tracker
        
        echo "编译完成，验证文件架构:"
        file tracker

    - name: 4. 上传编译结果
      uses: actions/upload-artifact@v4
      with:
        name: tracker_arm64_binary
        path: tracker
